name: Build and Release

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Custom version (e.g. 1.2.3). Leave empty for auto-increment.'
        required: false
        default: ''
      bump_type:
        description: 'Version bump type (only used when version_override is empty)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      build_os:
        description: 'Target OS (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - linux
          - windows
          - darwin
          - freebsd
          - openbsd
      build_arch:
        description: 'Target architecture (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - amd64
          - arm64
          - 386
          - arm

env:
  GO_VERSION: '1.26.3'
  NODE_VERSION: '24.10.0'
  DIST_DIR: dist

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.NEW_VERSION }}
      new_tag: ${{ steps.version.outputs.NEW_TAG }}
    env:
      GO111MODULE: on
      GOPROXY: https://proxy.golang.org,direct
      NPM_CONFIG_LEGACY_PEER_DEPS: 'true'
    steps:
      - uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            NEW_VERSION="${{ github.event.inputs.version_override }}"
          else
            LATEST_TAG=$(git tag --list "v*" --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)

            if [ -z "$LATEST_TAG" ]; then
              NEW_VERSION="1.0.0"
            else
              VERSION_NUM=${LATEST_TAG#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NUM"

              BUMP="${{ github.event.inputs.bump_type }}"
              BUMP="${BUMP:-patch}"

              case "$BUMP" in
                major)
                  MAJOR=$((MAJOR + 1))
                  MINOR=0
                  PATCH=0
                  ;;
                minor)
                  MINOR=$((MINOR + 1))
                  PATCH=0
                  ;;
                patch|*)
                  PATCH=$((PATCH + 1))
                  ;;
              esac

              NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "NEW_TAG=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: v$NEW_VERSION"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: make SIGN=0 VERBOSE=1 VERSION="${{ steps.version.outputs.NEW_VERSION }}" deps

      - name: Run backend unit tests
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: go test ./...

      - name: Build release
        env:
          OS: ${{ github.event.inputs.build_os || '' }}
          ARCH: ${{ github.event.inputs.build_arch || '' }}
        run: |
          make SIGN=0 VERBOSE=1 VERSION="${{ steps.version.outputs.NEW_VERSION }}" build-release
          rm -f "${{ env.DIST_DIR }}/AdGuardHome_frontend.tar.gz"

      - name: List built artifacts
        run: |
          echo "=== Built artifacts ==="
          ls -lh ${{ env.DIST_DIR }}/ || true
          echo ""
          echo "=== Checksums ==="
          cat ${{ env.DIST_DIR }}/checksums.txt || true

      - name: Upload artifacts - All platforms
        uses: actions/upload-artifact@v4
        with:
          name: AdGuardHome-v${{ steps.version.outputs.NEW_VERSION }}
          path: |
            ${{ env.DIST_DIR }}/*.tar.gz
            ${{ env.DIST_DIR }}/*.zip
            ${{ env.DIST_DIR }}/checksums.txt
            ${{ env.DIST_DIR }}/version.txt
          retention-days: 90

      - name: Upload artifacts - Windows
        uses: actions/upload-artifact@v4
        with:
          name: AdGuardHome-v${{ steps.version.outputs.NEW_VERSION }}-windows
          path: |
            ${{ env.DIST_DIR }}/AdGuardHome_windows_*.zip
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload artifacts - Linux
        uses: actions/upload-artifact@v4
        with:
          name: AdGuardHome-v${{ steps.version.outputs.NEW_VERSION }}-linux
          path: |
            ${{ env.DIST_DIR }}/AdGuardHome_linux_*.tar.gz
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload artifacts - macOS
        uses: actions/upload-artifact@v4
        with:
          name: AdGuardHome-v${{ steps.version.outputs.NEW_VERSION }}-macos
          path: |
            ${{ env.DIST_DIR }}/AdGuardHome_darwin_*.tar.gz
            ${{ env.DIST_DIR }}/AdGuardHome_darwin_*.zip
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload artifacts - FreeBSD
        uses: actions/upload-artifact@v4
        with:
          name: AdGuardHome-v${{ steps.version.outputs.NEW_VERSION }}-freebsd
          path: |
            ${{ env.DIST_DIR }}/AdGuardHome_freebsd_*.tar.gz
          if-no-files-found: ignore
          retention-days: 90

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Get changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --list "v*" --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          echo "PREV_TAG=${PREV_TAG:-}" >> $GITHUB_OUTPUT
          if [ -z "$PREV_TAG" ]; then
            LOGS=$(git log --pretty=format:"* %s" -20 | { grep -v "Co-Authored-By" || true; } | { grep -v "Claude-Session" || true; })
          else
            LOGS=$(git log --pretty=format:"* %s" "${PREV_TAG}..HEAD" | { grep -v "Co-Authored-By" || true; } | { grep -v "Claude-Session" || true; })
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "LOGS<<$EOF" >> $GITHUB_OUTPUT
          echo "$LOGS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: AdGuardHome-v${{ needs.build.outputs.new_version }}
          path: ${{ env.DIST_DIR }}

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ needs.build.outputs.new_tag }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists, skipping creation."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.build.outputs.new_tag }}
          name: "${{ needs.build.outputs.new_tag }}"
          artifacts: "${{ env.DIST_DIR }}/*.tar.gz,${{ env.DIST_DIR }}/*.zip,${{ env.DIST_DIR }}/checksums.txt"
          body: |
            ## AdGuard Home ${{ needs.build.outputs.new_tag }}

            ### Build Information
            | Component | Version |
            |-----------|---------|
            | Go | ${{ env.GO_VERSION }} |
            | Node.js | ${{ env.NODE_VERSION }} |
            | Release | ${{ needs.build.outputs.new_version }} |

            ### Changes
            ${{ steps.changelog.outputs.LOGS }}

            ### Downloads
            | Platform | Architecture | File |
            |----------|--------------|------|
            | Windows | x64 | `AdGuardHome_windows_amd64.zip` |
            | Windows | ARM64 | `AdGuardHome_windows_arm64.zip` |
            | Linux | x64 | `AdGuardHome_linux_amd64.tar.gz` |
            | Linux | ARM64 | `AdGuardHome_linux_arm64.tar.gz` |
            | macOS | x64 | `AdGuardHome_darwin_amd64.tar.gz` |
            | macOS | ARM64 (M1/M2) | `AdGuardHome_darwin_arm64.tar.gz` |

            ---
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.changelog.outputs.PREV_TAG }}...${{ needs.build.outputs.new_tag }}
