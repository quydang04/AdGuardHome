name: Docker Build and Push

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom Docker image tag (e.g. my-build)'
        required: false
        default: ''
      version_override:
        description: 'Custom version (e.g. 1.2.3). Leave empty for auto-increment.'
        required: false
        default: ''
      bump_type:
        description: 'Version bump type (only used when version_override is empty)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      platforms:
        description: 'Target platforms'
        required: false
        default: 'linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386,linux/ppc64le'
        type: choice
        options:
          - 'linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386,linux/ppc64le'
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64,linux/arm64,linux/arm/v7'
          - 'linux/amd64'
          - 'linux/arm64'

env:
  DOCKERHUB_IMAGE: quydang04/adguardhome
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/adguardhome
  NPM_CONFIG_LEGACY_PEER_DEPS: 'true'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        id: dockerhub_check
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "Docker Hub credentials not configured, skipping Docker Hub push."
            echo "Images will be pushed to GHCR only."
          fi

      - name: Login to Docker Hub
        if: steps.dockerhub_check.outputs.available == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.version_override }}" ]; then
            echo "VERSION=v${{ github.event.inputs.version_override }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "VERSION=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          else
            LATEST_TAG=$(git tag --list "v*" --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)

            if [ -z "$LATEST_TAG" ]; then
              NEW_VERSION="1.0.0"
            else
              VERSION_NUM=${LATEST_TAG#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NUM"

              BUMP="${{ github.event.inputs.bump_type }}"
              BUMP="${BUMP:-patch}"

              case "$BUMP" in
                major)
                  MAJOR=$((MAJOR + 1))
                  MINOR=0
                  PATCH=0
                  ;;
                minor)
                  MINOR=$((MINOR + 1))
                  PATCH=0
                  ;;
                patch|*)
                  PATCH=$((PATCH + 1))
                  ;;
              esac

              NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi

            echo "VERSION=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          fi
          echo "Resolved Docker image version: $(grep VERSION $GITHUB_OUTPUT | tail -1)"

      - name: Determine image names
        id: images
        run: |
          IMAGES="${{ env.GHCR_IMAGE }}"
          if [ "${{ steps.dockerhub_check.outputs.available }}" = "true" ]; then
            IMAGES="${{ env.DOCKERHUB_IMAGE }},${{ env.GHCR_IMAGE }}"
          fi
          echo "list=$IMAGES" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.VERSION }},enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}

      - name: Determine platforms
        id: platforms
        run: |
          if [ -n "${{ github.event.inputs.platforms }}" ]; then
            echo "value=${{ github.event.inputs.platforms }}" >> $GITHUB_OUTPUT
          else
            echo "value=linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386,linux/ppc64le" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.ci
          platforms: ${{ steps.platforms.outputs.value }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ steps.version.outputs.VERSION }}
            VCS_REF=${{ github.sha }}
            NPM_CONFIG_LEGACY_PEER_DEPS=${{ env.NPM_CONFIG_LEGACY_PEER_DEPS }}
          no-cache: true

      - name: Image digest
        run: echo "Digest=${{ steps.docker_build.outputs.digest }}"

      - name: Print usage instructions
        if: github.event_name != 'pull_request'
        run: |
          echo ""
          echo "============================================"
          echo "  Docker image pushed successfully!"
          echo "============================================"
          echo ""
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'
          echo ""
          echo "--- How to install on your VPS ---"
          echo ""
          echo "1. Pull the image:"
          echo "   docker pull ${{ env.GHCR_IMAGE }}:latest"
          echo ""
          echo "2. Run AdGuard Home:"
          echo "   docker run -d \\"
          echo "     --name adguardhome \\"
          echo "     --restart unless-stopped \\"
          echo "     -v /opt/adguardhome/work:/opt/adguardhome/work \\"
          echo "     -v /opt/adguardhome/conf:/opt/adguardhome/conf \\"
          echo "     -p 53:53/tcp -p 53:53/udp \\"
          echo "     -p 3000:3000/tcp \\"
          echo "     ${{ env.GHCR_IMAGE }}:latest"
          echo ""
          echo "3. Open setup wizard: http://<your-vps-ip>:3000"
          echo ""
          echo "============================================"
